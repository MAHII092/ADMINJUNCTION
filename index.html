<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Junction</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #2563eb);
      color: white;
    }

    .center {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 25px;
      border-radius: 24px;
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(18px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.25);
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    input, button {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 14px;
      border: none;
      font-size: 15px;
    }

    input {
      color: #111827;
    }

    button {
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .dashboard {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .topbar {
      background: rgba(255,255,255,0.14);
      padding: 18px;
      border-radius: 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .logout {
      max-width: 110px;
      background: #ef4444;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .stat {
      background: rgba(255,255,255,0.14);
      padding: 18px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 15px;
    }

    .client-card {
      background: rgba(255,255,255,0.14);
      padding: 18px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .badge {
      display: inline-block;
      background: #3b82f6;
      padding: 6px 11px;
      border-radius: 999px;
      font-size: 12px;
      margin-top: 8px;
    }

    .hidden {
      display: none;
    }

    .small {
      opacity: 0.85;
      font-size: 13px;
    }
  </style>
</head>

<body>

<div id="loginPage" class="center">
  <div class="card">
    <h1>Admin Junction</h1>
    <p class="small">Login to view your client data</p>

    <input id="userId" placeholder="User ID">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <p id="msg"></p>
  </div>
</div>

<div id="dashboard" class="dashboard hidden">
  <div class="topbar">
    <div>
      <h2>Admin Junction</h2>
      <p id="welcome" class="small"></p>
    </div>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <div class="stats">
    <div class="stat">
      <h3 id="totalCount">0</h3>
      <p>Total Clients</p>
    </div>
    <div class="stat">
      <h3 id="activeCount">0</h3>
      <p>Active</p>
    </div>
    <div class="stat">
      <h3 id="pendingCount">0</h3>
      <p>Pending</p>
    </div>
  </div>

  <input id="searchBox" placeholder="Search client..." onkeyup="searchClients()">

  <h3>Clients</h3>
  <div id="clients" class="grid"></div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbyL0c8vfSc75bSn7RefbMg5BtE76RXHKhFXMe_hyFrdxEK0R67MY7w0AL7gaW_t58tB/exec";

  let currentUser = null;
  let allClients = [];

  function login() {
    const userId = document.getElementById("userId").value.trim();
    const password = document.getElementById("password").value.trim();

    document.getElementById("msg").innerText = "Checking...";

    fetch(`${API_URL}?action=login&userId=${userId}&password=${password}`)
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          currentUser = data.user;
          localStorage.setItem("adminUser", JSON.stringify(currentUser));
          showDashboard();
          loadClients();
        } else {
          document.getElementById("msg").innerText = data.message;
        }
      })
      .catch(() => {
        document.getElementById("msg").innerText = "API error. Check Apps Script link.";
      });
  }

  function showDashboard() {
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");

    document.getElementById("welcome").innerText =
      "Welcome, " + currentUser.name + " | Role: " + currentUser.role;
  }

  function loadClients() {
    fetch(`${API_URL}?action=clients&userId=${currentUser.userId}&role=${currentUser.role}`)
      .then(res => res.json())
      .then(data => {
        allClients = data.clients || [];
        renderClients(allClients);
        updateStats(allClients);
      })
      .catch(() => {
        document.getElementById("clients").innerHTML = "Unable to load clients.";
      });
  }

  function renderClients(list) {
    let html = "";

    if (list.length === 0) {
      html = "<p>No clients found.</p>";
    }

    list.forEach(c => {
      html += `
        <div class="client-card">
          <h3>${c.ClientName || ""}</h3>
          <p><b>Mobile:</b> ${c.Mobile || ""}</p>
          <p><b>Service:</b> ${c.Service || ""}</p>
          <p><b>Assigned:</b> ${c.AssignedUser || ""}</p>
          <p><b>Date:</b> ${c.Date || ""}</p>
          <span class="badge">${c.Status || ""}</span>
        </div>
      `;
    });

    document.getElementById("clients").innerHTML = html;
  }

  function updateStats(list) {
    document.getElementById("totalCount").innerText = list.length;

    document.getElementById("activeCount").innerText =
      list.filter(c => String(c.Status).toLowerCase() === "active").length;

    document.getElementById("pendingCount").innerText =
      list.filter(c => String(c.Status).toLowerCase() === "pending").length;
  }

  function searchClients() {
    const q = document.getElementById("searchBox").value.toLowerCase();

    const filtered = allClients.filter(c =>
      String(c.ClientName).toLowerCase().includes(q) ||
      String(c.Mobile).toLowerCase().includes(q) ||
      String(c.Service).toLowerCase().includes(q)
    );

    renderClients(filtered);
    updateStats(filtered);
  }

  function logout() {
    localStorage.removeItem("adminUser");
    location.reload();
  }

  window.onload = function() {
    const saved = localStorage.getItem("adminUser");

    if (saved) {
      currentUser = JSON.parse(saved);
      showDashboard();
      loadClients();
    }
  };
</script>

</body>
</html>
