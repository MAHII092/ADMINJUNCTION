<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Junction</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{box-sizing:border-box;font-family:Arial,sans-serif}
    body{margin:0;min-height:100vh;background:linear-gradient(135deg,#0f172a,#2563eb);color:white}
    .center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card,.box,.topbar,.stat,.client-card{background:rgba(255,255,255,.14);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.22);box-shadow:0 14px 35px rgba(0,0,0,.25)}
    .card{width:100%;max-width:430px;padding:25px;border-radius:24px}
    h1,h2,h3{margin-top:0}
    input,select,button{width:100%;padding:14px;margin:8px 0;border-radius:14px;border:none;font-size:15px}
    input,select{color:#111827}
    button{background:#22c55e;color:white;font-weight:bold;cursor:pointer}
    .dashboard{max-width:1150px;margin:auto;padding:20px}
    .topbar{padding:18px;border-radius:22px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .logout{max-width:110px;background:#ef4444}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px;margin-bottom:20px}
    .stat{padding:18px;border-radius:20px}
    .box{padding:18px;border-radius:22px;margin-bottom:20px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:15px}
    .client-card{padding:18px;border-radius:20px}
    .badge{display:inline-block;background:#3b82f6;padding:6px 11px;border-radius:999px;font-size:12px;margin-top:8px}
    .hidden{display:none}
    .small{opacity:.85;font-size:13px}
  </style>
</head>

<body>

<div id="loginPage" class="center">
  <div class="card">
    <h1>Admin Junction</h1>
    <p class="small">Login to view your client data</p>

    <input id="userId" placeholder="User ID">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <p id="msg"></p>
  </div>
</div>

<div id="dashboard" class="dashboard hidden">
  <div class="topbar">
    <div>
      <h2>Admin Junction</h2>
      <p id="welcome" class="small"></p>
    </div>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <div class="stats">
    <div class="stat">
      <h3 id="totalCount">0</h3>
      <p>Total Clients</p>
    </div>
    <div class="stat">
      <h3 id="activeCount">0</h3>
      <p>Active</p>
    </div>
    <div class="stat">
      <h3 id="pendingCount">0</h3>
      <p>Pending</p>
    </div>
    <div class="stat">
      <h3 id="completedCount">0</h3>
      <p>Completed</p>
    </div>
  </div>

  <div id="addClientBox" class="box hidden">
    <h3>Add New Client</h3>
    <input id="clientName" placeholder="Client Name">
    <input id="mobile" placeholder="Mobile Number">
    <input id="service" placeholder="Service / Work">
    <select id="status">
      <option>Pending</option>
      <option>Active</option>
      <option>Completed</option>
    </select>
    <input id="assignedUser" placeholder="Assign User ID e.g. client1">
    <button onclick="addClient()">Add Client</button>
    <p id="addMsg"></p>
  </div>

  <input id="searchBox" placeholder="Search client..." onkeyup="searchClients()">

  <h3>Clients</h3>
  <div id="clients" class="grid"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyL0c8vfSc75bSn7RefbMg5BtE76RXHKhFXMe_hyFrdxEK0R67MY7w0AL7gaW_t58tB/exec";

let currentUser = null;
let allClients = [];

function callAPI(params, callback) {
  const cbName = "cb_" + Date.now();
  const script = document.createElement("script");

  window[cbName] = function(data) {
    callback(data);
    delete window[cbName];
    script.remove();
  };

  const query = new URLSearchParams(params).toString();
  script.src = API_URL + "?" + query + "&callback=" + cbName;
  document.body.appendChild(script);
}

function login() {
  const userId = document.getElementById("userId").value.trim();
  const password = document.getElementById("password").value.trim();

  document.getElementById("msg").innerText = "Checking...";

  callAPI({action:"login",userId:userId,password:password}, function(data) {
    if (data.success) {
      currentUser = data.user;
      localStorage.setItem("adminUser", JSON.stringify(currentUser));
      showDashboard();
      loadClients();
    } else {
      document.getElementById("msg").innerText = data.message;
    }
  });
}

function showDashboard() {
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
  document.getElementById("welcome").innerText =
    "Welcome, " + currentUser.name + " | Role: " + currentUser.role;

  if (currentUser.role === "admin") {
    document.getElementById("addClientBox").classList.remove("hidden");
  }
}

function loadClients() {
  callAPI({
    action:"clients",
    userId:currentUser.userId,
    role:currentUser.role
  }, function(data) {
    allClients = data.clients || [];
    renderClients(allClients);
    updateStats(allClients);
  });
}

function addClient() {
  const clientName = document.getElementById("clientName").value.trim();
  const mobile = document.getElementById("mobile").value.trim();
  const service = document.getElementById("service").value.trim();
  const status = document.getElementById("status").value.trim();
  const assignedUser = document.getElementById("assignedUser").value.trim();

  document.getElementById("addMsg").innerText = "Adding client...";

  callAPI({
    action:"addClient",
    clientName:clientName,
    mobile:mobile,
    service:service,
    status:status,
    assignedUser:assignedUser
  }, function(data) {
    document.getElementById("addMsg").innerText = data.message;

    if (data.success) {
      document.getElementById("clientName").value = "";
      document.getElementById("mobile").value = "";
      document.getElementById("service").value = "";
      document.getElementById("assignedUser").value = "";
      loadClients();
    }
  });
}

function renderClients(list) {
  let html = "";

  if (list.length === 0) {
    html = "<p>No clients found.</p>";
  }

  list.forEach(c => {
    html += `
      <div class="client-card">
        <h3>${c.ClientName || ""}</h3>
        <p><b>Client ID:</b> ${c.ClientID || ""}</p>
        <p><b>Mobile:</b> ${c.Mobile || ""}</p>
        <p><b>Service:</b> ${c.Service || ""}</p>
        <p><b>Assigned:</b> ${c.AssignedUser || ""}</p>
        <p><b>Date:</b> ${c.Date || ""}</p>
        <span class="badge">${c.Status || ""}</span>
      </div>
    `;
  });

  document.getElementById("clients").innerHTML = html;
}

function updateStats(list) {
  document.getElementById("totalCount").innerText = list.length;
  document.getElementById("activeCount").innerText =
    list.filter(c => String(c.Status).toLowerCase() === "active").length;
  document.getElementById("pendingCount").innerText =
    list.filter(c => String(c.Status).toLowerCase() === "pending").length;
  document.getElementById("completedCount").innerText =
    list.filter(c => String(c.Status).toLowerCase() === "completed").length;
}

function searchClients() {
  const q = document.getElementById("searchBox").value.toLowerCase();

  const filtered = allClients.filter(c =>
    String(c.ClientName).toLowerCase().includes(q) ||
    String(c.Mobile).toLowerCase().includes(q) ||
    String(c.Service).toLowerCase().includes(q) ||
    String(c.AssignedUser).toLowerCase().includes(q)
  );

  renderClients(filtered);
  updateStats(filtered);
}

function logout() {
  localStorage.removeItem("adminUser");
  location.reload();
}

window.onload = function() {
  const saved = localStorage.getItem("adminUser");
  if (saved) {
    currentUser = JSON.parse(saved);
    showDashboard();
    loadClients();
  }
};
</script>

</body>
</html>
